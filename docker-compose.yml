version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: techlab-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-techlab_db}
      MYSQL_USER: ${MYSQL_USER:-techlab_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-techlab_pass}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - techlab-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: techlab-phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: 300M
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
    depends_on:
      - mysql
    networks:
      - techlab-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: techlab-backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-techlab_db}
      DB_USER: ${MYSQL_USER:-techlab_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-techlab_pass}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      SERVER_PORT: 8080
      SHOW_SQL: false
      FORMAT_SQL: false
      LOG_LEVEL_APP: INFO
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - techlab-network

networks:
  techlab-network:
    driver: bridge

volumes:
  mysql-data:
