# TechLab E-Commerce API Configuration - Docker
spring.application.name=techlab-ecommerce

# Server Configuration
server.port=8080

# MySQL Database Configuration (Docker)
spring.datasource.url=jdbc:mysql://mysql:3306/techlab_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=techlab_user
spring.datasource.password=techlab_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
jwt.secret=techlabSecretKeyForJWTTokenGenerationThatIsLongEnough256Bits
jwt.expiration=86400000

# SpringDoc OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Logging
logging.level.com.techlab=INFO
logging.level.org.springframework.web=INFO
